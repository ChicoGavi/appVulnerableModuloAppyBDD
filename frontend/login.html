<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Acceso Corporativo - Aura Footwear</title>
  <!-- Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="styles.css" rel="stylesheet" />
  <style>
    .login-body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background-color: var(--white);
    }
    .split-wrapper {
      display: flex;
      height: 100vh;
      width: 100vw;
    }
    .split-image {
      flex: 1.2;
      background: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
      background-size: cover;
      position: relative;
    }
    .split-image-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(15,23,42,0.9) 0%, rgba(15,23,42,0.6) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 5rem;
    }
    .split-form {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      background-color: var(--white);
      max-width: 550px;
      box-shadow: -10px 0 30px rgba(0,0,0,0.05);
      z-index: 10;
    }
    .premium-input {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.8rem 1rem;
    }
    .premium-input:focus {
      background-color: var(--white);
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
    }
    @media (max-width: 991px) {
      .split-wrapper { flex-direction: column; }
      .split-image { flex: 0 0 30vh; }
      .split-image-overlay { padding: 2rem; justify-content: center; align-items: center; text-align: center; }
      .split-form { flex: 1; max-width: 100%; border-radius: 30px 30px 0 0; margin-top: -30px; padding: 2rem; }
    }
  </style>
</head>
<body class="login-body">
  <div class="split-wrapper">
    <!-- Left Column: Image -->
    <div class="split-image">
      <div class="split-image-overlay">
        <h1 class="text-white fw-bold mb-3" style="font-size: 4rem; letter-spacing: -2px;">Aura</h1>
        <h4 class="text-white-50 fw-light" style="letter-spacing: 3px; text-transform: uppercase;">Footwear Inventory</h4>
        <div style="width: 50px; height: 3px; background-color: var(--accent-color); margin: 2rem 0;"></div>
        <p class="text-white mt-1 fw-light" style="font-size: 1.1rem; max-width: 450px; line-height: 1.6;">
          Plataforma avanzada de gestión de inventarios empresariales. Garantizando control total y trazabilidad en todas las sucursales.
        </p>
      </div>
    </div>

    <!-- Right Column: Form (Moodle Style Login Structure) -->
    <div class="split-form">
      <div class="mb-5">
        <h2 style="color: var(--primary-color); font-weight: 800; letter-spacing: -1px;">Acceso Segurizado</h2>
        <p class="text-muted">Inicia sesión con tus credenciales.</p>
      </div>
      
      <div id="loginError" class="alert alert-danger d-none shadow-sm" style="border-radius: 8px; font-weight: 500;"></div>
      
      <form id="loginForm">
        <div class="mb-4">
          <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 1px;">Nombre de usuario</label>
          <input type="text" id="loginUsername" class="form-control premium-input" placeholder="empleado_aura" required />
        </div>
        <div class="mb-4">
          <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 1px;">Contraseña</label>
          <input type="password" id="loginPassword" class="form-control premium-input" placeholder="••••••••" required />
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-5">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label small text-muted select-none" for="rememberMe" style="user-select: none;">Recordar mis datos</label>
          </div>
          <a href="#" class="small fw-semibold text-decoration-none" style="color: var(--accent-color);">¿Ayuda?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm" style="background-color: var(--primary-color); border: none; border-radius: 8px; font-size: 1.05rem; transition: all 0.2s;">
          Ingresar al Sistema
        </button>
      </form>
      
      <div class="mt-auto pt-5 text-center">
        <p class="text-muted small mb-1">&copy; 2026 Aura Footwear Inc.</p>
        <p class="text-muted" style="font-size: 0.75rem;">Para cuentas nuevas, contacta a RRHH.</p>
      </div>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
